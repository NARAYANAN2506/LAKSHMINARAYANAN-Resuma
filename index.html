<h2>Register</h2>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>

<script>
function register() {
    fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name.value,
            email: email.value,
            mobile: mobile.value,
            password: password.value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>
<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p><a href="#" onclick="reset()">Forgot Password?</a></p>

<script>
function login() {
    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        if (data.message === "Login success") {
            window.location = "dashboard.html";
        }
    });
}

function reset() {
    const email = prompt("Enter Email or Mobile");
    const newPassword = prompt("Enter New Password");

    fetch("http://localhost:3000/reset", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, newPassword })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>
<h2>Family Dashboard</h2>

<h3>Create Family</h3>
<input id="husband" placeholder="Husband Name">
<input id="wife" placeholder="Wife Name">
<input id="date" type="date">

<button onclick="createFamily()">Create</button>

<h3>Add Member</h3>
<input id="fid" placeholder="Family ID">
<input id="mname" placeholder="Name">
<input id="relation" placeholder="Relation">
<input id="gender" placeholder="Gender">
<input id="dob" type="date">
<input id="job" placeholder="Occupation">

<button onclick="addMember()">Add</button>

<h3>View Family</h3>
<input id="viewId" placeholder="Family ID">
<button onclick="viewFamily()">View</button>

<pre id="output"></pre>

<script>
function createFamily() {
    fetch("http://localhost:3000/create-family", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            husband: husband.value,
            wife: wife.value,
            marriageDate: date.value
        })
    })
    .then(res => res.json())
    .then(data => alert("Family ID: " + data.familyId));
}

function addMember() {
    fetch("http://localhost:3000/add-member", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            familyId: fid.value,
            name: mname.value,
            relation: relation.value,
            gender: gender.value,
            dob: dob.value,
            occupation: job.value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function viewFamily() {
    fetch("http://localhost:3000/family/" + viewId.value)
    .then(res => res.json())
    .then(data => {
        output.textContent = JSON.stringify(data, null, 2);
    });
}
</script>
