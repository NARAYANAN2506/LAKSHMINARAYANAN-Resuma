<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
}
.container {
    width: 350px;
    margin: 80px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
button {
    width: 95%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="container">
<h2>Register</h2>

<input placeholder="Full Name">
<input placeholder="Email">
<input placeholder="Mobile Number">
<input type="password" placeholder="Password">

<button>Register</button>

<p>Already have account? <a href="login.html">Login</a></p>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Family Dashboard</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}
.container {
    width: 80%;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
.section {
    margin-bottom: 30px;
}
input {
    padding: 10px;
    margin: 5px;
}
button {
    padding: 10px;
    background: #333;
    color: white;
    border: none;
}
.card {
    display: inline-block;
    width: 150px;
    padding: 10px;
    margin: 10px;
    background: #eee;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">

<h2>Family Dashboard</h2>

<div class="section">
<h3>Create Family</h3>
<input placeholder="Husband Name">
<input placeholder="Wife Name">
<input type="date">
<button>Create Family</button>
</div>

<div class="section">
<h3>Add Member</h3>
<input placeholder="Family ID">
<input placeholder="Name">
<input placeholder="Relation (Son/Daughter)">
<input placeholder="Gender">
<input type="date">
<input placeholder="Occupation">
<button>Add Member</button>
</div>

<div class="section">
<h3>Family Members</h3>

<div class="card">
<h4>Father</h4>
<p>Engineer</p>
</div>

<div class="card">
<h4>Mother</h4>
<p>Teacher</p>
</div>

<div class="card">
<h4>Son</h4>
<p>Student</p>
</div>

<div class="card">
<h4>Daughter</h4>
<p>Student</p>
</div>

</div>

</div>

</body>
</html>
